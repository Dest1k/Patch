name: Patch Samsung Wearable APK

# Как пользоваться:
#   1. Зайди в репозиторий
#   2. Нажми "Add file" -> "Upload files"
#   3. Перетащи сюда wearable.apk
#   4. Нажми Commit changes
#   5. Actions запустится автоматически
#   6. Скачай готовый APK из Artifacts

on:
  push:
    paths:
      - 'wearable.apk'

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download apktool
        run: |
          curl -L -o apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar

      - name: Decompile APK
        run: java -jar apktool.jar d wearable.apk -o decompiled -f

      - name: Patch smali
        run: python3 patch/patch_wearable.py decompiled/

      - name: Recompile APK
        run: |
          java -jar apktool.jar b decompiled -o wearable_unsigned.apk -f --use-aapt2 \
            || java -jar apktool.jar b decompiled -o wearable_unsigned.apk -f

      - name: Generate keystore & sign
        run: |
          keytool -genkey -v \
            -keystore patch.keystore -alias patch \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Patch,OU=Patch,O=Patch,L=X,ST=X,C=US" \
            -storepass patchpass -keypass patchpass -noprompt
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -1)
          $APKSIGNER sign \
            --ks patch.keystore --ks-pass pass:patchpass --key-pass pass:patchpass \
            --out wearable_patched.apk wearable_unsigned.apk

      - name: Upload patched APK
        uses: actions/upload-artifact@v4
        with:
          name: samsung-wearable-patched
          path: wearable_patched.apk
          if-no-files-found: error
