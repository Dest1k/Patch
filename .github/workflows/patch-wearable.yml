name: Patch Samsung Wearable APK

on:
  push:
    paths:
      - 'wearable.apk'
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download baksmali & smali (Maven Central)
        run: |
          curl -fL -o baksmali.jar \
            https://repo1.maven.org/maven2/org/smali/baksmali/2.5.2/baksmali-2.5.2.jar
          curl -fL -o smali.jar \
            https://repo1.maven.org/maven2/org/smali/smali/2.5.2/smali-2.5.2.jar
          java -jar baksmali.jar --version
          java -jar smali.jar --version

      - name: Unpack APK
        run: |
          mkdir apk_out
          unzip -q wearable.apk -d apk_out
          echo "=== DEX files ==="
          ls apk_out/*.dex 2>/dev/null || echo "No dex files found!"

      - name: Decompile DEX to smali
        run: |
          mkdir -p smali_src
          for dex in apk_out/classes*.dex; do
            [ -f "$dex" ] || continue
            name=$(basename "$dex" .dex)
            echo "Decompiling $name ..."
            java -jar baksmali.jar d "$dex" -o "smali_src/$name"
          done

      - name: Patch smali
        run: python3 patch/patch_wearable.py smali_src/

      - name: Recompile smali to DEX
        run: |
          for dir in smali_src/classes*; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            echo "Compiling $name ..."
            java -jar smali.jar a "$dir" -o "apk_out/$name.dex"
          done

      - name: Repack APK
        run: |
          cd apk_out && zip -q -r ../wearable_unsigned.apk . && cd ..
          echo "Repacked: $(du -sh wearable_unsigned.apk)"

      - name: Align & sign
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -1)
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign   | sort -V | tail -1)
          $ZIPALIGN -p 4 wearable_unsigned.apk wearable_aligned.apk
          keytool -genkey -v -keystore patch.keystore -alias patch \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Patch,OU=Patch,O=Patch,L=X,ST=X,C=US" \
            -storepass patchpass -keypass patchpass -noprompt
          $APKSIGNER sign \
            --ks patch.keystore --ks-pass pass:patchpass --key-pass pass:patchpass \
            --out wearable_patched.apk wearable_aligned.apk
          echo "Done: $(du -sh wearable_patched.apk)"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: samsung-wearable-patched
          path: wearable_patched.apk
          if-no-files-found: error
