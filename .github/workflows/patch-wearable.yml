name: Patch Samsung Wearable APK

on:
  push:
    paths:
      - 'wearable.apk'
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download apktool
        run: |
          wget -q -O apktool.jar \
            https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar

      - name: Decompile (with resources for analysis)
        run: |
          java -jar apktool.jar d -f wearable.apk -o decompiled_full
          echo "=== Smali file count ==="
          find decompiled_full/smali -name '*.smali' | wc -l

      - name: Find error strings in resources
        run: |
          echo "=== Searching strings for error keywords ==="
          find decompiled_full/res -name '*.xml' 2>/dev/null | \
            xargs grep -li 'unauthorized\|modified\|tamper\|not_support\|unsupport\|incompatible\|os_error\|security' 2>/dev/null | head -10

          echo "=== Matching string entries ==="
          find decompiled_full/res -name '*.xml' | \
            xargs grep -i 'unauthorized\|without.*author\|modified.*os\|os.*modified\|tamper\|not supported\|security.*error\|galaxy.*only\|samsung.*only' 2>/dev/null | head -30

          echo "=== Hardcoded error strings in smali ==="
          grep -r 'const-string.*[Uu]nauthori\|const-string.*[Mm]odified\|const-string.*[Tt]amper\|const-string.*[Nn]ot.*[Ss]upport' \
            decompiled_full/smali/ 2>/dev/null | head -20

          echo "=== Classes with AlertDialog in setup/compat packages ==="
          grep -rl 'AlertDialog\|showDialog\|DialogFragment' decompiled_full/smali/ | \
            grep -i 'setup\|compat\|support\|check\|platform\|device\|phone\|main\|launch\|splash' | head -10

          echo "=== Main activity from manifest ==="
          python3 -c "
import xml.etree.ElementTree as ET
tree = ET.parse('decompiled_full/AndroidManifest.xml')
root = tree.getroot()
ns = 'http://schemas.android.com/apk/res/android'
for app in root.iter('application'):
    print('App name:', app.get(f'{{{ns}}}name',''))
for act in root.iter('activity'):
    intents = [i for i in act if any(a.get(f'{{{ns}}}name','').endswith('MAIN') for a in i)]
    if intents:
        print('MAIN activity:', act.get(f'{{{ns}}}name',''))
    elif act.get(f'{{{ns}}}name','').lower().endswith('activity'):
        print('Activity:', act.get(f'{{{ns}}}name',''))
" 2>/dev/null | head -30

      - name: Decompile smali only (for patching)
        run: |
          java -jar apktool.jar d --no-res -f wearable.apk -o decompiled

      - name: Patch smali
        run: python3 patch/patch_wearable.py decompiled/ decompiled_full/

      - name: Recompile
        run: |
          java -jar apktool.jar b decompiled -o wearable_unsigned.apk
          echo "Repacked: $(du -sh wearable_unsigned.apk)"

      - name: Align & sign
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -1)
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign   | sort -V | tail -1)
          $ZIPALIGN -p 4 wearable_unsigned.apk wearable_aligned.apk
          keytool -genkey -v -keystore patch.keystore -alias patch \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Patch,OU=Patch,O=Patch,L=X,ST=X,C=US" \
            -storepass patchpass -keypass patchpass -noprompt
          $APKSIGNER sign \
            --ks patch.keystore --ks-pass pass:patchpass --key-pass pass:patchpass \
            --out wearable_patched.apk wearable_aligned.apk
          echo "Done: $(du -sh wearable_patched.apk)"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: samsung-wearable-patched
          path: wearable_patched.apk
          if-no-files-found: error
